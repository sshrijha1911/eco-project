<!DOCTYPE html>
<html>
<head>
<title>Eco Login</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #43e97b, #38f9d7);
  text-align: center;
}
.login-box {
  background: white;
  width: 300px;
  margin: 120px auto;
  padding: 30px;
  border-radius: 15px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}
button {
  background: green;
  color: white;
  border: none;
}
</style>
</head>

<body>
<h1>🌍 Eco Login 🌱</h1>

<div class="login-box">
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u && p){
    window.location = "home.html";
  } else {
    alert("Enter details!");
  }
}
</script>
</body>
</html>
